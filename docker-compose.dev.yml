version: '3.8'

services:
  forge-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command: bun run dev
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
    environment:
      - NODE_ENV=development

  forge-brain:
    build:
      context: .
      dockerfile: apps/brain/Dockerfile.dev
    command: bun run dev
    volumes:
      - ./apps/brain:/app/apps/brain
      - ./packages:/app/packages
    environment:
      - NODE_ENV=development

  forge-worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile.dev
    command: bun run dev
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages:/app/packages
    environment:
      - NODE_ENV=development

  forge-realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile.dev
    command: bun run dev
    volumes:
      - ./apps/realtime:/app/apps/realtime
      - ./packages:/app/packages
    environment:
      - NODE_ENV=development

  # Database added for local dev
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=forgeai
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
